id: g100-flow-14-reservar-proceso
title: 'Cómo reservar → pide datos'
category: g100 / flows

turns:
  - user: 'Hola, busco finca en Anapoima para 8 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING

  - user: 'La primera me encanta, cómo hago para reservarla?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'nombre'
          - 'datos'
          - 'reserv'
          - 'documento'
          - 'correo'
          - 'proceso'
