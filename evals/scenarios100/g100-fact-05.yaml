id: g100-fact-05
title: 'Factual: Cuántas habitaciones tiene la primera opción?'
category: g100 / factual

turns:
  - user: 'Hola, busco finca en Anapoima para 10 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'te paso con mi compañero'

  - user: 'Cuántas habitaciones tiene la primera opción?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'habitacion'
          - 'Habitacion'
          - 'habitaciones'
