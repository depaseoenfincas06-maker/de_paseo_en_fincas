id: g100-flow-09-presupuesto
title: 'Presupuesto → alternativa económica'
category: g100 / flows

turns:
  - user: 'Hola, busco finca en Anapoima para 10 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING

  - user: 'Todas están muy caras, tienes algo más económico?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'económica'
          - 'económico'
          - 'opción'
          - 'alternativa'
          - 'presupuesto'
