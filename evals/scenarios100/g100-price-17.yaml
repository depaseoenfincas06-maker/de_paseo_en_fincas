id: g100-price-17-girardot-05
title: 'Precio exacto GIRARDOT_#05 — 8 px, 2 noches estándar'
category: g100 / pricing

# Sheet: base=$1.200.000, extra=$150.000, cap 8/16,
# dep=$300.000, limp=$120.000, extras=0
