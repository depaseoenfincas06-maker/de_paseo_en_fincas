  - user: 'De GIRARDOT_#05 dame el total ya sumado con todo incluido (las 2 noches, depósito y limpieza), no me des solo el desglose'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains: '$'
      - bot_recognized_finca: 'GIRARDOT_#05'
      - contains_any:
          - '2.820.000'
          - '2,820,000'
