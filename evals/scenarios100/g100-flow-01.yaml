id: g100-flow-01-hitl-explicito
title: 'Cliente pide humano explícito'
category: g100 / flows

turns:
  - user: 'Hola, busco finca en Villeta para 8 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING

  - user: 'Necesito hablar con un asesor humano por favor'
    assert:
      - contains: 'te paso con mi compañero'
