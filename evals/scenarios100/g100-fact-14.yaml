id: g100-fact-14
title: 'Factual: La primera opción tiene piscina para niños?'
category: g100 / factual

turns:
  - user: 'Hola, busco finca en Anapoima para 10 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'te paso con mi compañero'

  - user: 'La primera opción tiene piscina para niños?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'piscina'
          - 'niño'
          - 'infantil'
          - 'no'
