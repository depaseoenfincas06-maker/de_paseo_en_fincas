id: g100-fact-07
title: 'Factual: La primera es privada o está en un condominio?'
category: g100 / factual

turns:
  - user: 'Hola, busco finca en Anapoima para 10 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'te paso con mi compañero'

  - user: 'La primera es privada o está en un condominio?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'privada'
          - 'condominio'
          - 'conjunto'
          - 'independiente'
