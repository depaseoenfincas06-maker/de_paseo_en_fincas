id: g100-fact-10
title: 'Factual: Cómo es la acomodación de las habitaciones de la primera?'
category: g100 / factual

turns:
  - user: 'Hola, busco finca en Anapoima para 10 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'te paso con mi compañero'

  - user: 'Cómo es la acomodación de las habitaciones de la primera?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'habitacion'
          - 'cama'
          - 'acomoda'
          - 'persona'
