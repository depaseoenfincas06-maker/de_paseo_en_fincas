  - user: 'De PEREIRA_#04 dame el total ya sumado con todo incluido (las 2 noches, depósito y limpieza), no me des solo el desglose'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains: '$'
      - bot_recognized_finca: 'PEREIRA_#04'
      - contains_any:
          - '3.420.000'
          - '3,420,000'
