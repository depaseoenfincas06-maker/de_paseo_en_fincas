id: g100-price-40-santafe-20
title: 'Precio exacto SANTAFE_#20 — 15 px, 2 noches estándar'
category: g100 / pricing

# Sheet: base=$1.500.000, extra=$100.000, cap 15/25,
# dep=$300.000, limp=$120.000, extras=0
# TOTAL esperado: $3.420.000

turns:
  - user: 'Hola, busco finca en Antioquia para 15 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'no tenemos'
      - not_contains: 'te paso con mi compañero'

  - user: 'De SANTAFE_#20 dame el total ya sumado con todo incluido (las 2 noches, depósito y limpieza), no me des solo el desglose'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains: '$'
      - bot_recognized_finca: 'SANTAFE_#20'
      - contains_any:
          - '3.420.000'
          - '3,420,000'
