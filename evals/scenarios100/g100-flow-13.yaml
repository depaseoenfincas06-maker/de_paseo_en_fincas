id: g100-flow-13-cancelacion
title: 'Política cancelación'
category: g100 / flows

turns:
  - user: 'Hola, busco finca en Villeta para 8 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING

  - user: 'Si me toca cancelar, me devuelven la plata?'
    assert:
      - contains_any:
          - 'cancel'
          - 'reembols'
          - 'devolución'
          - 'devolucion'
          - 'política'
          - 'politica'
          - 'compañero'
