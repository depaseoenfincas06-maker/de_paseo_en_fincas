  - user: 'De GIRARDOT13 dame el total ya sumado con todo incluido (las 2 noches, depósito y limpieza), no me des solo el desglose'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains: '$'
      - bot_recognized_finca: 'GIRARDOT13'
      - contains_any:
          - '4.820.000'
          - '4,820,000'
