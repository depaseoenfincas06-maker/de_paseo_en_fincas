id: g100-fact-13
title: 'Factual: Cuál es la más cercana al pueblo de las que me mostraste?'
category: g100 / factual

turns:
  - user: 'Hola, busco finca en Anapoima para 10 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'te paso con mi compañero'

  - user: 'Cuál es la más cercana al pueblo de las que me mostraste?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'min'
          - 'MIN'
          - 'cerca'
          - 'pueblo'
