id: g100-edge-03-finca-inexistente
title: 'Finca inventada → aclara sin inventar'
category: g100 / edge

turns:
  - user: 'Hola, busco finca en Anapoima para 8 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING

  - user: 'Quiero la finca ANAPOIMA_#99'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains_any:
          - 'no'
          - 'verificar'
          - 'disponible'
          - 'alternativa'
