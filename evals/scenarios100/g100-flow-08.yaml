id: g100-flow-08-cambio-finca
title: 'Cambio de finca fluido'
category: g100 / flows

turns:
  - user: 'Hola, busco finca en Anapoima para 8 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING

  - user: 'Me gusta la primera... aunque no, mejor dime el precio de la segunda'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains: '$'
