id: g100-price-18-girardot-18
title: 'Precio exacto GIRARDOT_#18 — 30 px, 2 noches estándar'
category: g100 / pricing

# Sheet: base=$4.200.000, extra=$140.000, cap 30/70,
# dep=$300.000, limp=$120.000, extras=0
# TOTAL esperado: $8.820.000

turns:
  - user: 'Hola, busco finca en Girardot para 30 personas del 25 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'no tenemos'
      - not_contains: 'te paso con mi compañero'

  - user: 'De GIRARDOT_#18 dame el total ya sumado con todo incluido (las 2 noches, depósito y limpieza), no me des solo el desglose'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains: '$'
      - bot_recognized_finca: 'GIRARDOT_#18'
      - contains_any:
          - '8.820.000'
          - '8,820,000'
