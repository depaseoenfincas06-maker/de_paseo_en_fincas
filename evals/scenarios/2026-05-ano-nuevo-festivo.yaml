id: 2026-05-ano-nuevo-festivo
title: Reserva de Año Nuevo se clasifica como temporada alta (no estándar)
category: regression / pricing-classification

seed_failure:
  wa_id: '(suite 140 pruebas)'
  observed_at: '2026-05-28'
  fix_commit: 9305c9e
  symptom: |
    El bot clasificaba fechas que incluyen 31-dic / 1-ene como tarifa
    "estándar", cuando deben ser temporada alta. Resultado: cotizaciones
    subvaluadas para Año Nuevo.
  fix_description: |
    El classifier de fechas en BIT ahora reconoce el rango de temporada alta
    de fin de año (dic 26 - ene 6) y aplica precio_temporada_alta.

turns:
  # Nota: incluimos zona (Anapoima) para no quedar atascados en QUALIFYING
  # pidiendo la zona. Lo que evalúa el scenario es la CLASIFICACIÓN de fechas,
  # no la captura de criterios.
  - user: 'Quiero una finca en Anapoima para 10 personas del 30 de diciembre al 2 de enero'
    assert:
      - state_equals: OFFERING
      - not_contains: 'te paso con mi compañero'
      - not_contains: 'tarifa estándar'
      - not_contains: 'precio estándar'

  - user: 'Cuánto sería el total de la primera opción?'
    assert:
      - not_contains: 'te paso con mi compañero'
      # El bot debe reconocer que las fechas son especiales. Aceptamos
      # cualquier señal: mención de tarifa temporada alta, año nuevo, festivo,
      # o el bloqueo por mínimo de noches (las fincas exigen 5+ en año nuevo,
      # y ese bloqueo es tan válido como cotizar en temporada alta).
      - contains_any:
          - 'temporada alta'
          - 'año nuevo'
          - 'festivo'
          - 'mínimo de'
          - 'estadía mínima'
