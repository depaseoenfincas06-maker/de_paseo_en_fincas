id: 2026-07-real-price-07-san-jeronimo02
title: Precio real SAN_JERONIMO_#02 — 15 px, 24-27 ago, 3 noches con extras
category: real-inventory / pricing

# Sheet: base=$1.500.000, extra=$125.000, cap 12/28
# Cálculo (15 px, 3 noches):
#   extras = 15-12 = 3
#   per_night = 1.500.000 + 125.000*3 = 1.875.000
#   subtotal = 5.625.000
#   TOTAL = 5.625.000 + 300.000 + 120.000 = $6.045.000

turns:
  - user: 'Busco finca en Antioquia para 15 personas del 24 al 27 de agosto de 2026'
    assert:
      - state_equals: OFFERING
      - not_contains: 'no tenemos'

  - user: 'Cuánto sería el total exacto de SAN_JERONIMO_#02?'
    assert:
      - not_contains: 'te paso con mi compañero'
      - contains: '$'
      - bot_recognized_finca: 'SAN_JERONIMO_#02'
      - contains_any:
          - '6.045'
          - '6,045'
